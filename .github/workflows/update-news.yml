name: Update News Weekly

on:
  schedule:
    - cron: '0 1 * * 1'  # ทุกวันจันทร์ 08:00 น. (UTC+7)
  workflow_dispatch:       # รันมือได้จาก GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run news updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
        run: node update-news.js

      - name: Commit updated news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news-data.json
          git diff --staged --quiet || git commit -m "chore: weekly news update $(date '+%Y-%m-%d')"
          git push
